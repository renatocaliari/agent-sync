# agent-sync - Global Agent Registry
# --------------------------------------
# This file defines how each AI agent integration works.
# 
# SCHEMA:
#   method: 
#     - native: Agent reads directly from ~/.agents/skills/
#     - config: Agent supports custom skill paths in its own config file
#     - copy:   Fallback method. agent-sync copies skills to the agent's folder
#
#   skills_dir_name: The folder name where the agent expects skills (tools/commands)
#
#   check: How to detect if the agent is installed
#     - binary: Check if a command exists in PATH
#     - path:   Check if a specific file exists
#     - always: true (for internal components)
#
#   config_update (required for method: config):
#     - path: Dot-notation to the key in the JSON config (e.g., "skills.paths")
#     - action: "append" (for lists) or "set" (for single values)
#
#   extra_paths (optional): Additional folders to sync (used by pi.dev)

opencode:
  method: config
  config_dir: "~/.config/opencode"
  config_filename: "opencode.json"
  config_patterns: ["*.json", "*.jsonc", "AGENTS.md", "SYSTEM.md"]
  skills_dir_name: "skills"
  check:
    binary: "opencode"
  config_update:
    path: "skills.paths"
    action: append

claude-code:
  method: copy
  config_dir: "~/.claude"
  config_filename: "settings.json"
  config_patterns: ["*.json", "AGENTS.md", "SYSTEM.md"]
  skills_dir_name: "commands"
  check:
    binary: "claude"

gemini-cli:
  method: copy
  config_dir: "~/.gemini"
  config_filename: "settings.json"
  config_patterns: ["*.json", "AGENTS.md", "SYSTEM.md"]
  skills_dir_name: "tools"
  check:
    binary: "gemini"

pi.dev:
  method: native
  config_dir: "~/.pi/agent"
  config_filename: "settings.json"
  config_patterns: ["*.json", "*.yaml", "AGENTS.md", "SYSTEM.md"]
  skills_dir_name: "skills"
  check:
    path: "~/.pi/agent/settings.json"
  extra_paths:
    extensions: ["~/.pi/agent/extensions", "~/.pi/extensions"]
    prompts: ["~/.pi/agent/prompts", "~/.pi/prompts"]
    themes: ["~/.pi/agent/themes", "~/.pi/themes"]

qwen-code:
  method: copy
  config_dir: "~/.qwen"
  config_filename: "settings.json"
  config_patterns: ["*.json", "AGENTS.md", "SYSTEM.md"]
  skills_dir_name: "skills"
  check:
    binary: "qwen"

global-skills:
  method: native
  skills_dir_name: "skills"
  check:
    always: true

# =============================================================================
# VS Code Extensions & IDE Agents
# =============================================================================

roocode:
  method: native
  config_dir: "~/.roo"
  config_filename: "custom_modes.yaml"
  config_patterns: ["*.yaml", "*.json", "*.md"]
  skills_dir_name: "skills"
  check:
    path: "~/.roo/custom_modes.yaml"
  notes: "Native support for ~/.agents/skills/ (higher priority than ~/.roo/skills/)"
  mode_specific: true  # Supports skills-code/, skills-architect/, etc.
  migrate_from: "~/.roo/skills/"

cline:
  method: copy
  config_dir: "~/.cline"
  config_filename: "state.json"
  config_patterns: ["*.md", "*.json"]
  skills_dir_name: "skills"
  check:
    binary: "cline"
  # Copy from project skills directories to global hub
  copy_from:
    - ".cline/skills/"
    - ".clinerules/skills/"
    - ".claude/skills/"
  copy_to: "~/.agents/skills/"

cursor:
  method: native
  config_dir: "~/.cursor"
  config_filename: "settings.json"
  config_patterns: ["*.md"]
  skills_dir_name: "skills"
  check:
    binary: "cursor"
  notes: "Native support for ~/.agents/skills/ (project and global)"
  migrate_from:
    - ".cursor/skills/"
    - "~/.cursor/skills/"

windsurf:
  method: copy
  config_dir: "~/.codeium/windsurf"
  config_filename: "config.json"
  config_patterns: ["*.md"]
  skills_dir_name: "skills"
  check:
    binary: "windsurf"
  # Copy from project/global skills directories to global hub
  copy_from:
    - ".windsurf/skills/"
    - "~/.codeium/windsurf/skills/"
  copy_to: "~/.agents/skills/"
